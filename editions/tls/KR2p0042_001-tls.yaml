body:
  text: 恒先無有質靜虛樸大樸靜大靜虛大虛自厭不自忍或作有或焉有氣有氣焉有有有有焉有始有始焉有往者未有天地未有作行出生虛靜為一若寂寂夢夢靜同而未有明未有滋生氣寔自生恒莫生氣氣是自生自作恒氣之生不獨有與也或恒焉生或者同焉昏昏不寧求其所生異生異歸生歸違生違非生非襲生襲求欲自復復生之生行濁氣生地清氣生天氣信神哉云芸相生神盈天地同出而異性因生其所欲業業天地紛紛而多彩物先者有善有治無亂有人焉有不善亂出於人先有中焉有外先有小焉有大先有柔焉有剛先有圓焉有方先有晦焉有明先有短焉有長天地既載唯一以猶一唯復以猶復恒氣之生因復其所欲明明天行唯復以不廢知既而巟思不殄有出於或性出於有意出於性言出於意名出於言事出於名或非或無謂或有非有無謂有性非性無謂性意非意無謂意言非言無謂言名非名無謂名事非事無謂事祥義利巧彩物出於作作焉有事不作無事舉天之事自作為事庸以不可賡也凡言名先者有疑巟言之後者效比焉舉天下之名虛樹習以不可改也舉天下之作強者果天下之大作其熾尨不自若作庸有果與不果兩者不廢舉天下之為也無舍也無與也而能自為也舉天下之生同也其事無不復天下之作也無忤極無非其所舉天下之作也無不得其極而果遂庸或得之庸或失之
